version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: areauser
      POSTGRES_PASSWORD: areapass
      POSTGRES_DB: area_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev:/var/lib/postgresql/data
    networks:
      - area-dev

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_dev:/data
    networks:
      - area-dev

volumes:
  postgres_dev:
  redis_dev:

networks:
  area-dev:
    driver: bridge
