version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: area-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-areauser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-areapass}
      POSTGRES_DB: ${DB_NAME:-area_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-areauser}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - area-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: area-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - area-network

  # Express API Server
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: area-api
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      DATABASE_URL: postgresql://${DB_USER:-areauser}:${DB_PASSWORD:-areapass}@postgres:5432/${DB_NAME:-area_db}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: 7d
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      TWITTER_CLIENT_ID: ${TWITTER_CLIENT_ID}
      TWITTER_CLIENT_SECRET: ${TWITTER_CLIENT_SECRET}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      API_URL: ${API_URL:-http://localhost:5000}
      WEB_URL: ${WEB_URL:-http://localhost:3000}
      MOBILE_URL: ${MOBILE_URL:-http://localhost:3001}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./server:/app
      - /app/node_modules
    networks:
      - area-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # React Web Client
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: area-web
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:5000}
      REACT_APP_ENVIRONMENT: ${NODE_ENV:-development}
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./web:/app
      - /app/node_modules
    networks:
      - area-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: area-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - web
    networks:
      - area-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  area-network:
    driver: bridge
